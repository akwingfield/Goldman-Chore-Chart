function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3500);}
function spawnPop(el){const r=el.getBoundingClientRect(),div=document.createElement("div");div.className="pop";div.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];div.style.left=(r.left+r.width/2-14)+"px";div.style.top=(r.top+window.scrollY-10)+"px";document.body.appendChild(div);setTimeout(()=>div.remove(),950);}
function launchConfetti(color){const colors=[color,"#f59e0b","#22c55e","#ec4899","#8b5cf6","#3b82f6"];for(let i=0;i<50;i++){const d=document.createElement("div");d.className="conf";d.style.cssText=`left:${Math.random()*100}vw;top:0;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;animation-duration:${0.9+Math.random()*0.7}s`;document.body.appendChild(d);setTimeout(()=>d.remove(),1800);}}
function showTab(t){["chart","board","rewards"].forEach(x=>document.getElementById("tab-"+x).classList.toggle("hidden",x!==t));document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",["chart","board","rewards","admin"][i]===t));if(t==="board")renderLeaderboard();if(t==="rewards")renderRewards();}
function buildWeekLabel(){const dates=getWeekDates();document.getElementById("week-label").textContent="Week of "+formatShort(dates[0])+" – "+formatShort(dates[6]);}
function buildDayRow(){const dates=getWeekDates();document.getElementById("dayrow").innerHTML=DAYS.map((d,i)=>{const dl=getDeadline(d);return `<button class="daybtn${d===activeDay?" active":""}" onclick="selectDay('${d}')" style="display:flex;flex-direction:column;align-items:center;line-height:1.3"><span>${d.slice(0,3)}</span><span style="font-size:10px;opacity:0.75">${formatShort(dates[i])}</span><span style="font-size:9px;opacity:0.6">by ${dl.label}</span></button>`;}).join("");}
function selectDay(d){activeDay=d;buildDayRow();renderChores();updateProgress();checkReminder();renderExtraChoresPanel();}
function checkReminder(){const now=new Date(),hour=now.getHours(),min=now.getMinutes(),banner=document.getElementById("reminder-banner"),dl=getDeadline(activeDay),allC=CHORES[activeDay]||[],extras=extraChores[activeDay]||[];const remaining=allC.filter((_,i)=>!checked[activeDay+"-"+i]).length+extras.filter((_,i)=>!checked[activeDay+"-extra-"+i]).length;const isPast=hour>dl.hour||(hour===dl.hour&&min>=dl.min),isSoon=!isPast&&(hour===dl.hour-1||(dl.hour===10&&hour===9));if(remaining===0){banner.innerHTML="";return;}if(isPast){const names=[...new Set(allC.filter((_,i)=>!checked[activeDay+"-"+i]).map(c=>c.kid))];banner.innerHTML=`<div class="reminder" style="background:linear-gradient(135deg,#dc2626,#b91c1c)"><span style="font-size:20px">🚨</span><div class="reminder-txt">Deadline passed! <strong>${remaining} chore${remaining!==1?"s":""}</strong> undone for ${names.join(", ")}. Due by ${dl.label}!</div><button class="reminder-close" onclick="this.closest('.reminder').remove()">✕</button></div>`;}else if(isSoon){const names=[...new Set(allC.filter((_,i)=>!checked[activeDay+"-"+i]).map(c=>c.kid))];banner.innerHTML=`<div class="reminder"><span style="font-size:20px">⏰</span><div class="reminder-txt">Heads up! Chores due by <strong>${dl.label}</strong> — ${remaining} left for ${names.join(", ")}.</div><button class="reminder-close" onclick="this.closest('.reminder').remove()">✕</button></div>`;}else{banner.innerHTML="";}}
setInterval(checkReminder,60000);
function weeklyTotals(){const totals={},done={};KIDS.forEach(k=>{totals[k.name]=0;done[k.name]=0;});DAYS.forEach(day=>{(CHORES[day]||[]).forEach((c,i)=>{totals[c.kid]=(totals[c.kid]||0)+1;if(checked[day+"-"+i])done[c.kid]=(done[c.kid]||0)+1;});(extraChores[day]||[]).forEach((c,i)=>{totals[c.kid]=(totals[c.kid]||0)+1;if(checked[day+"-extra-"+i])done[c.kid]=(done[c.kid]||0)+1;});});return {totals,done};}
function renderScoreRow(){const {totals,done}=weeklyTotals();document.getElementById("scorerow").innerHTML=KIDS.map(k=>{const s=stars[k.name]||0,claimed=claimedRewards[k.name]||[],next=THRESHOLDS.find(t=>t.stars>s&&!claimed.includes(t.stars)),pct=next?Math.round(s/next.stars*100):100,isF=kidFilter===k.name,wDone=done[k.name]||0,wTotal=totals[k.name]||1,wPct=Math.round(wDone/wTotal*100),earned=allowanceEarned[k.name];return `<div class="scard${isF?" active-filter":""}" style="border-color:${earned?"#22c55e":isF?k.color:k.color+"33"}" onclick="filterKid('${k.name}')"><div class="avatar" style="background:${k.light};color:${k.color}">${k.name[0]}</div><div class="sname">${k.name}</div><div class="sstar" style="color:${k.color}">${s} &#9733;</div>${earned?'<div class="streak" style="background:#dcfce7;color:#15803d">💰 Allowance!</div>':streaks[k.name]>=2?'<div class="streak">🔥 '+streaks[k.name]+' day streak</div>':""}<div style="font-size:10px;color:#999;margin-top:5px;font-weight:600">Week: ${wDone}/${wTotal}</div><div class="sbar"><div class="sbar-fill" style="width:${wPct}%;background:${earned?"#22c55e":k.color}"></div></div></div>`;}).join("");}
function filterKid(name){kidFilter=kidFilter===name?null:name;renderScoreRow();renderChores();}
function renderChores(){const all=CHORES[activeDay]||[],groups={};KIDS.forEach(k=>{groups[k.name]=[];});all.forEach((c,i)=>{if(groups[c.kid])groups[c.kid].push({...c,idx:i});});let html="";KIDS.forEach(k=>{if(kidFilter&&kidFilter!==k.name)return;const kc=groups[k.name];if(!kc.length)return;const done=kc.filter(c=>checked[activeDay+"-"+c.idx]).length;html+=`<div class="kgroup"><div class="khdr" style="background:${k.color}"><div style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0">${k.name[0]}</div><span class="kname">${k.name} <span style="opacity:0.7;font-weight:400;font-size:12px">(age ${k.age})</span></span><span class="kcount">${done}/${kc.length}</span></div><div class="chores-list">`;kc.forEach(c=>{const key=activeDay+"-"+c.idx,isDone=!!checked[key];html+=`<div class="chore${isDone?" done":""}" onclick="toggleChore('${key}','${c.kid}')"><div class="chk">${isDone?"✓":""}</div><span class="chore-txt">${c.text}</span></div>`;});html+=`</div></div>`;});document.getElementById("chore-list").innerHTML=html;}
function updateProgress(){const all=CHORES[activeDay]||[],extras=extraChores[activeDay]||[],done=all.filter((_,i)=>checked[activeDay+"-"+i]).length+extras.filter((_,i)=>checked[activeDay+"-extra-"+i]).length,tot=all.length+extras.length,pct=tot>0?Math.round(done/tot*100):0;document.getElementById("prog-lbl").textContent=`${done} / ${tot} done`;document.getElementById("prog-fill").style.width=pct+"%";document.getElementById("prog-pct").textContent=pct+"%";document.getElementById("prog-fill").style.background=pct===100?"#22c55e":"#7d3c98";}
function checkMilestone(kidName,s){const hit=THRESHOLDS.find(t=>t.stars===s);if(!hit)return;launchConfetti(kidObj(kidName).color);setTimeout(()=>showToast("🎉 "+kidName+" unlocked: "+hit.reward),400);}
function checkAllowance(kidName){const {totals,done}=weeklyTotals();if(done[kidName]===totals[kidName]&&totals[kidName]>0&&!allowanceEarned[kidName]){allowanceEarned[kidName]=true;launchConfetti(kidObj(kidName).color);setTimeout(()=>showToast("💰 "+kidName+" completed ALL chores — allowance earned!"),400);}if(done[kidName]<totals[kidName])allowanceEarned[kidName]=false;}
function toggleChore(key,kidName){const el=document.querySelector(`.chore[onclick="toggleChore('${key}','${kidName}')"]`),wasDone=!!checked[key];checked[key]=!wasDone;stars[kidName]=Math.max(0,(stars[kidName]||0)+(wasDone?-1:1));if(el){el.classList.toggle("done",!wasDone);el.querySelector(".chk").textContent=!wasDone?"✓":"";if(!wasDone)spawnPop(el);}if(!wasDone){checkMilestone(kidName,stars[kidName]);checkAllowance(kidName);}renderScoreRow();updateProgress();if(el){const kg=el.closest(".kgroup");if(kg){const a=kg.querySelectorAll(".chore"),d=[...a].filter(c=>c.classList.contains("done")).length;kg.querySelector(".kcount").textContent=`${d}/${a.length}`;}}pushState();}
function renderExtraChoresPanel(){const isWeekend=WEEKEND_DAYS.includes(activeDay),panel=document.getElementById("extra-chores-panel");if(!isWeekend){panel.innerHTML="";return;}const extras=extraChores[activeDay]||[];let html=`<div style="margin-top:8px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:#7d3c98;margin-bottom:8px">➕ Bonus Chores (${activeDay})</div>`;if(extras.length){html+=`<div style="border:2px solid #e8daef;border-radius:14px;overflow:hidden;margin-bottom:10px">`;extras.forEach((c,i)=>{const kid=kidObj(c.kid),key=activeDay+"-extra-"+i,isDone=!!checked[key];html+=`<div class="chore${isDone?" done":""}" onclick="toggleExtra('${activeDay}',${i},'${c.kid}')"><div class="chk">${isDone?"✓":""}</div><span class="chore-txt">${c.text}</span><span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;background:${kid.light};color:${kid.color};flex-shrink:0">${c.kid}</span>${isAdmin?`<button onclick="event.stopPropagation();removeExtra('${activeDay}',${i})" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0">✕</button>`:""}</div>`;});html+=`</div>`;}if(isAdmin){html+=`<div style="background:#f9f5ff;border-radius:12px;padding:12px;border:1.5px solid #e8daef"><div style="font-size:12px;font-weight:700;color:#7d3c98;margin-bottom:8px">Add a bonus chore:</div><input id="extra-text" type="text" placeholder="e.g. Vacuum upstairs" style="width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;font-family:inherit;margin-bottom:8px;outline:none"><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${KIDS.map(k=>`<button onclick="setExtraKid('${k.name}')" id="ek-${k.name}" style="padding:5px 12px;border-radius:99px;border:2px solid ${k.color};background:white;color:${k.color};font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">${k.name}</button>`).join("")}</div><button onclick="addExtra()" style="width:100%;padding:9px;border-radius:8px;background:#7d3c98;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Add Bonus Chore ★</button></div>`;}html+=`</div>`;panel.innerHTML=html;}
let selectedExtraKid=null;
function setExtraKid(name){selectedExtraKid=name;KIDS.forEach(k=>{const btn=document.getElementById("ek-"+k.name);if(btn){btn.style.background=k.name===name?kidObj(k.name).color:"white";btn.style.color=k.name===name?"#fff":kidObj(k.name).color;}});}
function addExtra(){const txt=document.getElementById("extra-text").value.trim();if(!txt){showToast("Please enter a chore description!");return;}if(!selectedExtraKid){showToast("Please choose which kid!");return;}if(!extraChores[activeDay])extraChores[activeDay]=[];extraChores[activeDay].push({text:txt,kid:selectedExtraKid});selectedExtraKid=null;renderExtraChoresPanel();updateProgress();renderScoreRow();pushState();}
function removeExtra(day,idx){const key=day+"-extra-"+idx;if(checked[key]){stars[extraChores[day][idx].kid]=Math.max(0,stars[extraChores[day][idx].kid]-1);}delete checked[key];extraChores[day].splice(idx,1);renderExtraChoresPanel();updateProgress();renderScoreRow();pushState();}
function toggleExtra(day,idx,kidName){const key=day+"-extra-"+idx,wasDone=!!checked[key];checked[key]=!wasDone;stars[kidName]=Math.max(0,(stars[kidName]||0)+(wasDone?-1:1));if(!wasDone){checkMilestone(kidName,stars[kidName]);checkAllowance(kidName);}renderExtraChoresPanel();updateProgress();renderScoreRow();pushState();}
function renderLeaderboard(){const sorted=[...KIDS].sort((a,b)=>(stars[b.name]||0)-(stars[a.name]||0)),maxS=Math.max(...sorted.map(k=>stars[k.name]||0),1),medals=["🥇","🥈","🥉","4️⃣"];document.getElementById("leaderboard").innerHTML=sorted.map((k,i)=>{const s=stars[k.name]||0;return `<div class="lrow"><div class="lrank">${medals[i]}</div><div class="lavatar" style="background:${k.light};color:${k.color}">${k.name[0]}</div><div class="lname">${k.name}</div><div class="lbar-wrap"><div class="lbar" style="width:${Math.round(s/maxS*100)}%;background:${k.color}"></div></div><div class="lscore" style="color:${k.color}">${s} &#9733;</div></div>`;}).join("");}
function claimReward(kidName,rewardStars){stars[kidName]=Math.max(0,stars[kidName]-rewardStars);showToast("✅ "+kidName+" used "+rewardStars+"★ — "+stars[kidName]+"★ remaining!");renderScoreRow();renderRewards();pushState();}
function renderRewards(){const {totals,done}=weeklyTotals();let html=`<div style="background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:20px;border:2px solid #86efac;box-shadow:0 2px 12px rgba(34,197,94,0.1)"><div style="font-size:15px;font-weight:700;color:#15803d;margin-bottom:12px">💰 Weekly Allowance</div><div style="font-size:13px;color:#555;margin-bottom:14px">Complete <strong>every single chore all week</strong> to earn your allowance!</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">`;KIDS.forEach(k=>{const wDone=done[k.name]||0,wTotal=totals[k.name]||1,wPct=Math.round(wDone/wTotal*100),earned=allowanceEarned[k.name];html+=`<div style="background:${earned?"#f0fdf4":"#f9f9f9"};border-radius:12px;padding:12px;border:1.5px solid ${earned?"#86efac":"#eee"}"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:26px;height:26px;border-radius:50%;background:${k.light};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${k.color}">${k.name[0]}</div><span style="font-size:13px;font-weight:700;color:${earned?"#15803d":k.color}">${k.name}</span>${earned?'<span style="font-size:16px;margin-left:auto">💰</span>':""}</div><div style="font-size:11px;color:#888;margin-bottom:5px">${wDone} of ${wTotal} done (${wPct}%)</div><div style="height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden"><div style="height:100%;width:${wPct}%;background:${earned?"#22c55e":k.color};border-radius:99px"></div></div>${earned?'<div style="font-size:11px;font-weight:700;color:#15803d;margin-top:6px">Allowance earned!</div>':'<div style="font-size:11px;color:#aaa;margin-top:6px">'+(wTotal-wDone)+' left this week</div>'}</div>`;});html+=`</div></div><div style="background:#fff8e1;border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#92400e;border:1.5px solid #fde68a">⭐ <strong>Stars carry over week to week!</strong> When you use a reward, those stars are deducted and your balance keeps building.</div>`;KIDS.forEach(k=>{const s=stars[k.name]||0;html+=`<div class="reward-section"><div class="rsec-title"><div style="width:28px;height:28px;border-radius:50%;background:${k.light};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${k.color}">${k.name[0]}</div>${k.name} &mdash; <span style="color:${k.color}">${s} &#9733; total</span></div>`;THRESHOLDS.forEach(t=>{const unlocked=s>=t.stars;html+=`<div class="ritem${unlocked?" unlocked":""}"><div class="rbadge" style="background:${unlocked?"#dcfce7":"#f5f5f5"};color:${unlocked?"#15803d":"#aaa"};${!unlocked?"opacity:0.5":""}">${unlocked?"✓":t.stars}</div><div style="flex:1"><div class="rlabel">${t.stars} &#9733; — ${t.reward}</div>${!unlocked?`<div class="rsub">${t.stars-s} more stars to go</div>`:""}</div>${unlocked?`<button onclick="claimReward('${k.name}',${t.stars})" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">Use ${t.stars}★</button>`:'<span style="font-size:13px;opacity:0.3">🔒</span>'}</div>`;});html+=`</div>`;});document.getElementById("rewards-content").innerHTML=html;}
function saveWeek(){const dates=getWeekDates(),{totals,done}=weeklyTotals();let txt="FAMILY CHORE CHART — Week of "+formatShort(dates[0])+" - "+formatShort(dates[6])+"\n"+"=".repeat(50)+"\n\n";KIDS.forEach(k=>{const d=done[k.name]||0,t=totals[k.name]||0,pct=t>0?Math.round(d/t*100):0;txt+=k.name.toUpperCase()+" — "+d+"/"+t+" chores ("+pct+"%) — Stars: "+stars[k.name]+(allowanceEarned[k.name]?" 💰 ALLOWANCE EARNED":"")+"\n";});txt+="\nDAILY BREAKDOWN\n"+"-".repeat(50)+"\n";DAYS.forEach((day,di)=>{txt+="\n"+day+" ("+formatShort(dates[di])+")\n";(CHORES[day]||[]).forEach((c,i)=>txt+="  ["+(checked[day+"-"+i]?"✓":" ")+"] "+c.kid+": "+c.text+"\n");});txt+="\nStar Totals: "+KIDS.map(k=>k.name+": "+stars[k.name]+"★").join(" | ");const blob=new Blob([txt],{type:"text/plain"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ChoreChart_"+formatShort(dates[0]).replace("/","-")+"_to_"+formatShort(dates[6]).replace("/","-")+".txt";a.click();showToast("📄 Week saved!");}
function showAdminLogin(){const mc=document.getElementById("modal-container");mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h2>⚙️ Parent Admin</h2><p style="font-size:13px;color:#666;margin-bottom:16px">Enter password to manage chores</p><input type="password" id="admin-pw" class="admin-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkAdminPw()"><div style="display:flex;gap:8px;margin-top:4px"><button class="admin-btn primary" style="flex:1" onclick="checkAdminPw()">Enter</button><button class="admin-btn" style="background:#f5f5f5;color:#666;flex:1" onclick="closeModal()">Cancel</button></div></div></div>`;}
function checkAdminPw(){const pw=document.getElementById("admin-pw").value;if(pw===ADMIN_PASSWORD){isAdmin=true;closeModal();showAdminPanel();}else{showToast("Incorrect password!");}}
function closeModal(){document.getElementById("modal-container").innerHTML="";}
function showAdminPanel(){const mc=document.getElementById("modal-container");mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h2>⚙️ Manage Chores</h2><div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">${DAYS.map(d=>`<button onclick="showAdminDay('${d}')" style="padding:6px 12px;border-radius:99px;border:2px solid #7d3c98;background:${d===activeDay?"#7d3c98":"white"};color:${d===activeDay?"#fff":"#7d3c98"};font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">${d.slice(0,3)}</button>`).join("")}</div><div id="admin-day-content"></div><div style="margin-top:16px;padding-top:16px;border-top:1px solid #eee"><div style="font-size:13px;font-weight:700;color:#333;margin-bottom:10px">Add New Chore</div><select id="admin-day-sel" class="admin-input" style="margin-bottom:8px">${DAYS.map(d=>`<option value="${d}"${d===activeDay?" selected":""}>${d}</option>`).join("")}</select><select id="admin-kid-sel" class="admin-input" style="margin-bottom:8px">${KIDS.map(k=>`<option value="${k.name}">${k.name}</option>`).join("")}</select><input type="text" id="admin-chore-txt" class="admin-input" placeholder="Chore description..."><button class="admin-btn primary" style="width:100%;margin-top:4px" onclick="adminAddChore()">Add Chore</button></div><div style="margin-top:12px;display:flex;gap:8px"><button class="admin-btn danger" style="flex:1" onclick="if(confirm('Reset ALL check marks for this week?')){checked={};renderAll();pushState();closeModal();}">Reset Week</button><button class="admin-btn" style="background:#f5f5f5;color:#555;flex:1" onclick="isAdmin=false;closeModal();renderExtraChoresPanel()">Exit Admin</button></div></div></div>`;showAdminDay(activeDay);}
function showAdminDay(day){const chores=CHORES[day]||[];let html=`<div style="font-size:13px;font-weight:700;color:#333;margin-bottom:8px">${day} Chores</div>`;if(!chores.length){html+='<div style="font-size:13px;color:#aaa;padding:8px">No chores for this day</div>';}chores.forEach((c,i)=>{const kid=kidObj(c.kid);html+=`<div class="admin-chore-item"><div style="width:22px;height:22px;border-radius:50%;background:${kid.light};color:${kid.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${c.kid[0]}</div><span style="flex:1;font-size:12px;color:#333">${c.text}</span><select onchange="adminChangeKid('${day}',${i},this.value)" style="font-size:11px;border:1px solid #ddd;border-radius:6px;padding:3px;font-family:inherit;margin-right:4px">${KIDS.map(k=>`<option value="${k.name}"${k.name===c.kid?" selected":""}>${k.name}</option>`).join("")}</select><button onclick="adminRemoveChore('${day}',${i})" style="background:#fee2e2;color:#dc2626;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700">✕</button></div>`;});const el=document.getElementById("admin-day-content");if(el)el.innerHTML=html;}
function adminAddChore(){const day=document.getElementById("admin-day-sel").value,kid=document.getElementById("admin-kid-sel").value,txt=document.getElementById("admin-chore-txt").value.trim();if(!txt){showToast("Please enter a chore description!");return;}if(!CHORES[day])CHORES[day]=[];CHORES[day].push({text:txt,kid});document.getElementById("admin-chore-txt").value="";showAdminDay(day);renderChores();updateProgress();pushState();showToast("Chore added to "+day+"!");}
function adminRemoveChore(day,idx){if(!confirm("Remove this chore?"))return;CHORES[day].splice(idx,1);showAdminDay(day);renderChores();updateProgress();pushState();showToast("Chore removed!");}
function adminChangeKid(day,idx,newKid){CHORES[day][idx].kid=newKid;renderChores();pushState();showToast("Reassigned to "+newKid+"!");}
function renderAll(){buildDayRow();renderScoreRow();renderChores();updateProgress();renderExtraChoresPanel();checkReminder();}
buildWeekLabel();
pullState();
</script>
</body>
</html>
